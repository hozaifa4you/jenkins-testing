sonar.projectKey=devops-practice
sonar.projectName=Jenkins Testing

# Sources - both frontend and backend
sonar.sources=backend/src,frontend/app

# Test directories
sonar.tests=backend/src,backend/test
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/*.js

# Language
sonar.language=ts
sonar.typescript.tsconfigPath=backend/tsconfig.json
